{% extends "base.html" %}
{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger border-2 rounded-4">
                <div class="card-body p-5">
                    <i class="bi bi-exclamation-triangle-fill text-danger display-1 mb-3"></i>
                    <h2 class="fw-bold">Delete Event?</h2>
                    <p class="lead">Are you sure you want to permanently delete "<strong>{{ event.title }}</strong>"?</p>
                    <p class="text-muted small mb-4">This will also delete all volunteer registrations associated with this event.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2">
                            <a href="{% url 'admin_report' %}" class="btn btn-secondary px-4 rounded-pill">Cancel</a>
                            <button type="submit" class="btn btn-danger px-4 rounded-pill">Yes, Delete Event</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

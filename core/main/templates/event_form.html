{% extends "base.html" %}
{% block title %}{{ action }} Event - Admin Panel{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4">{{ action }} Community Event</h2>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row g-3">
                            {% for field in form %}
                            <div class="col-md-{% if field.name == 'description' or field.name == 'title' %}12{% else %}6{% endif %}">
                                <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                                {{ field }}
                            </div>
                            {% endfor %}
                        </div>
                        <div class="mt-4 pt-3 border-top d-flex gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill px-5">Save Event</button>
                            <a href="{% url 'admin_report' %}" class="btn btn-light rounded-pill px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
